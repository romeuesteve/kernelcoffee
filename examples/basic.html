<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGPU ASCII Renderer - Basic Example</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #00ff00;
    }
    #canvas-container {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    canvas {
      border: 2px solid #333;
      image-rendering: pixelated;
    }
    #info {
      margin-top: 20px;
      font-size: 14px;
      color: #666;
      text-align: center;
    }
    #error {
      color: #ff4444;
      margin-top: 20px;
      max-width: 600px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <canvas id="ascii-canvas"></canvas>
  </div>
  <div id="info">Drag to rotate • Scroll to zoom</div>
  <div id="error"></div>

  <script type="module">
    import { ASCIIRenderer, isWebGPUSupported } from '../src/index.js';

    const errorDiv = document.getElementById('error');
    const asciiCanvas = document.getElementById('ascii-canvas');

    if (!isWebGPUSupported()) {
      errorDiv.textContent = 'WebGPU is not supported in your browser. Please use Chrome 113+ or Firefox 113+.';
      throw new Error('WebGPU not supported');
    }

    // Set canvas size
    asciiCanvas.width = 960;
    asciiCanvas.height = 960;

    // Initialize the renderer
    const renderer = new ASCIIRenderer({
      canvas: asciiCanvas,
      modelUrl: '/resources/apfel.glb',
      mode: 'ascii',
      fontSize: 12,
      autoRotate: true,
      onError: (error) => {
        console.error('Renderer error:', error);
        errorDiv.textContent = `Error: ${error.message}`;
      },
      onFPSUpdate: (fps) => {
        console.log('FPS:', fps);
      },
    });

    // Initialize and start rendering
    await renderer.init();
    console.log('Renderer initialized successfully');
  </script>
</body>
</html>
